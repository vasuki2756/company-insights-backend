services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: kits_placement
      POSTGRES_USER: kits
      POSTGRES_PASSWORD: dev_password_change_me
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kits"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_MODELS: /root/.ollama/models
    healthcheck:
      test: ["CMD", "ollama", "--version"]
      interval: 10s
      timeout: 10s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://kits:dev_password_change_me@postgres:5432/kits_placement
      REDIS_URL: redis://redis:6379
      OLLAMA_API_URL: http://ollama:11434
      JWT_SECRET: dev-secret-key-min-32-chars-long
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    command: bun run dev

volumes:
  postgres_data:
  redis_data:
  ollama_data:
